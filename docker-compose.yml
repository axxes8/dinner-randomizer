services:
  dinner-randomizer:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/axxes8/dinner-randomizer:latest
    container_name: dinner-randomizer
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - meals_data:/app/data

  watchtower:
    image: containrrr/watchtower
    container_name: dinner-randomizer-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true

volumes:
  meals_data:
