services:
  dinner-randomizer:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/axxes8/dinner-randomizer:latest
    container_name: dinner-randomizer
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - meals_data:/app/data

volumes:
  meals_data:
