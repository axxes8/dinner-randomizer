services:
  dinner-randomizer:
    # Build locally from this repo; do not attempt to pull from a registry.
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dinner-randomizer
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - meals_data:/app/data

volumes:
  meals_data:
